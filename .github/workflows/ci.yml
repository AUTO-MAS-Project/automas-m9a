name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python scripts/build_all.py
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/**/*

